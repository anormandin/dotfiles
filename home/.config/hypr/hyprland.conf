# ~/.config/hypr/hyprland.conf
# Starter config for archdev (RTX 4070 Ti SUPER, DP-2 1440p@144).
# Mod key = SUPER (the Windows/Cmd-position key). dwm used Left Alt; this uses SUPER
# so Alt stays free for apps. Change $mod below to ALT if you prefer the dwm feel.

################
### MONITOR  ###
################
# name, resolution@refresh, position, scale
monitor = DP-2, 2560x1440@144, 0x0, 1
# fallback for any other display
monitor = , preferred, auto, 1

#######################
### NVIDIA ENV VARS ###
#######################
# Required/recommended for NVIDIA on Wayland. If you hit issues, the Hyprland
# wiki "NVIDIA" page is the source of truth.
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Toolkit Wayland hints
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24

#####################
### PROGRAMS      ###
#####################
$terminal = alacritty
$menu     = wofi --show drun
$mod      = SUPER

#####################
### AUTOSTART     ###
#####################
exec-once = waybar
exec-once = swaybg -c 282828
exec-once = dunst
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --watch cliphist store

#####################
### LOOK & FEEL   ###
#####################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(458588ff)
    col.inactive_border = rgba(504945ff)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 6
    blur {
        enabled = true
        size = 3
        passes = 1
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

# dwindle = binary-split tiling (BSP-like). New window splits the focused one.
# Toggle split direction with $mod+J. This is more predictable than dwm's
# master/stack. To try a master layout instead, set general:layout = master.
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#####################
### INPUT         ###
#####################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

#####################
### KEYBINDINGS   ###
#####################
# Launchers / window management
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,            # dwindle pseudotile
bind = $mod, J, togglesplit,       # flip the dwindle split direction
bind = $mod, B, exec, pkill -SIGUSR1 waybar  # toggle bar

# Move focus (vim keys + arrows)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move the window itself
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Resize the focused window
bind = $mod CTRL, h, resizeactive, -40 0
bind = $mod CTRL, l, resizeactive, 40 0
bind = $mod CTRL, k, resizeactive, 0 -40
bind = $mod CTRL, j, resizeactive, 0 40

# Workspaces 1-10 (these are the macOS-Spaces analog)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Send window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Cycle workspaces with scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse drag move/resize (hold mod)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot region -> clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Media / volume / brightness keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

#####################
### WINDOW RULES  ###
#####################
windowrulev2 = float, class:^(Gimp)$
windowrulev2 = float, title:^(Open File)$
