# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         TMUX CONFIGURATION                                    ║
# ║                    Catppuccin Mocha + Neovim Integration                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ══════════════════════════════════════════════════════════════════════════════
# PREFIX KEY
# ══════════════════════════════════════════════════════════════════════════════
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ══════════════════════════════════════════════════════════════════════════════
# TERMINAL SETTINGS
# ══════════════════════════════════════════════════════════════════════════════
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"

# ══════════════════════════════════════════════════════════════════════════════
# GENERAL SETTINGS
# ══════════════════════════════════════════════════════════════════════════════
set -g mouse on                    # Enable mouse support
set -g history-limit 100000        # Large buffer for Claude Code output
set -g base-index 1                # Start windows at 1
setw -g pane-base-index 1          # Start panes at 1
set -g renumber-windows on         # Renumber windows on close
set -sg escape-time 0              # No delay for escape key
set -g focus-events on             # Enable focus events for nvim
set -g status-position top         # Status bar at top
set -g detach-on-destroy off       # Don't exit tmux when closing session
set -g set-clipboard on            # System clipboard integration
set -g display-time 4000           # Show messages for 4 seconds
set -g status-interval 5           # Update status bar every 5 seconds
set -g allow-rename off            # Keep custom window names
set -g automatic-rename off        # Disable automatic window renaming

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - GENERAL
# ══════════════════════════════════════════════════════════════════════════════
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window (keep current path)
bind c new-window -c "#{pane_current_path}"

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - NAVIGATION (Seamless with Neovim)
# ══════════════════════════════════════════════════════════════════════════════
# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Also handle copy-mode
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - RESIZE PANES
# ══════════════════════════════════════════════════════════════════════════════
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - WINDOWS
# ══════════════════════════════════════════════════════════════════════════════
bind -n M-h previous-window        # Alt+h = previous window
bind -n M-l next-window            # Alt+l = next window
bind -n M-1 select-window -t 1     # Alt+1-9 = select window
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - SESSIONS
# ══════════════════════════════════════════════════════════════════════════════
bind -n M-s choose-session         # Alt+s = session picker
bind -n M-n new-session            # Alt+n = new session
bind -n M-d detach-client          # Alt+d = detach
bind -n M-Tab switch-client -l     # Alt+Tab = last session
bind Tab last-window               # Prefix+Tab = last window

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - PANE LAYOUTS
# ══════════════════════════════════════════════════════════════════════════════
bind -r m resize-pane -Z           # Toggle zoom
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind Space next-layout             # Cycle through layouts
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# ══════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS - POPUPS (tmux 3.2+)
# ══════════════════════════════════════════════════════════════════════════════
bind -n M-g display-popup -E -h 90% -w 90% -d "#{pane_current_path}" "lazygit"
bind -n M-t display-popup -E -h 80% -w 80% -d "#{pane_current_path}"

# ══════════════════════════════════════════════════════════════════════════════
# COPY MODE (Vim style)
# ══════════════════════════════════════════════════════════════════════════════
setw -g mode-keys vi

# Enter copy mode
bind Enter copy-mode
bind -n M-[ copy-mode

# Selection and copy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Search
bind -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# ══════════════════════════════════════════════════════════════════════════════
# PLUGINS
# ══════════════════════════════════════════════════════════════════════════════
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'

# ══════════════════════════════════════════════════════════════════════════════
# CATPPUCCIN THEME CONFIGURATION (v2 syntax)
# ══════════════════════════════════════════════════════════════════════════════
set -g @catppuccin_flavor "mocha"

# Window styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Status bar
set -g status-left-length 100
set -g status-right-length 100

# Make sure status modules are loaded after TPM
# ══════════════════════════════════════════════════════════════════════════════
# SESSION PERSISTENCE (Resurrect + Continuum)
# ══════════════════════════════════════════════════════════════════════════════
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-dir '~/.tmux/resurrect'

# Auto-save and restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ══════════════════════════════════════════════════════════════════════════════
# INITIALIZE TPM (must be at the bottom)
# ══════════════════════════════════════════════════════════════════════════════
run '~/.tmux/plugins/tpm/tpm'

# ══════════════════════════════════════════════════════════════════════════════
# STATUS BAR (must be AFTER TPM loads catppuccin)
# ══════════════════════════════════════════════════════════════════════════════
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}#{continuum_status}"
